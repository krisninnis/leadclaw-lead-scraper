name: LeadClaw Scraper Pipeline

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          OUTREACH_BASE_URL: ${{ secrets.OUTREACH_BASE_URL }}
          OUTREACH_RUN_TOKEN: ${{ secrets.OUTREACH_RUN_TOKEN }}
          OUTREACH_DEMO_URL: ${{ secrets.OUTREACH_DEMO_URL }}
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
          FREE_TIER_MODE: "1"
          SCRAPER_DAILY_NEW_CAP: "40"
          ENRICH_DAILY_LIMIT: "20"
          TARGET_MARKET: "uk"
        run: |
          python auto_pipeline.py --limit 4
